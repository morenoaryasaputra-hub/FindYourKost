<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}FindYourKost Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

    <style>
        .mobile-toggle { display: none; }
        .sidebar-overlay { display: none; }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed !important;
                top: 0; left: 0;
                width: 260px !important;
                height: 100vh !important;
                z-index: 9999 !important;
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                background-color: #1e293b; /* Warna admin sidebar */
            }
            .sidebar.show-mobile { transform: translateX(0); }
            .main-content {
                margin-left: 0 !important;
                width: 100% !important;
            }
            .sidebar-overlay {
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 9998;
                opacity: 0; visibility: hidden;
                transition: 0.3s ease-in-out;
            }
            .sidebar-overlay.show-mobile {
                opacity: 1; visibility: visible; display: block;
            }
            .mobile-toggle {
                display: inline-block !important;
                background: none; border: none;
                font-size: 1.5rem; color: #374151;
                margin-right: 15px; cursor: pointer;
            }
            .page-title h1 { font-size: 1.25rem !important; margin-bottom:0; }
            .user-profile-top span { display: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="mobileOverlayAdmin"></div>

    <div class="d-flex" style="min-height: 100vh; width: 100vw; overflow-x: hidden;">
        
        <aside class="sidebar" id="sidebarMenuAdmin">
            <div class="sidebar-logo">
                <h2>FindYourKost</h2>
                <span>Sistem Pusat Admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="{{ url_for('admin.dashboard') }}" class="{% if request.endpoint == 'admin.dashboard' %}active{% endif %}"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="{{ url_for('admin.kelola_pengguna') }}" class="{% if request.endpoint == 'admin.kelola_pengguna' %}active{% endif %}"><i class="fa-solid fa-users"></i> Manajemen Pengguna</a></li>
                <li><a href="{{ url_for('admin.layanan_premium') }}" class="{% if request.endpoint == 'admin.pengaturan_iklan' %}active{% endif %}"><i class="fa-solid fa-rectangle-ad"></i> Pengaturan Harga Iklan</a></li>
                <li><a href="{{ url_for('admin.approval_kos') }}" class="{% if request.endpoint == 'admin.approval_kos' %}active{% endif %}"><i class="fa-solid fa-house-medical-circle-check"></i> Approval Properti Kos</a></li>
                <li><a href="{{ url_for('admin.keuangan') }}" class="{% if request.endpoint == 'admin.keuangan' %}active{% endif %}"><i class="fa-solid fa-wallet"></i> Manajemen Keuangan</a></li>
                <hr style="border-top: 1px solid rgba(255, 255, 255, 0.15); margin: 15px 20px;">
                <li><a href="{{ url_for('admin.profil') }}" class="{% if request.endpoint == 'admin.profil' %}active{% endif %}"><i class="fa-solid fa-user-shield"></i> Profil Saya</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="{{ url_for('auth.logout') }}" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Keluar Sistem</a>
            </div>
        </aside>

        <main class="main-content flex-grow-1">
            <header class="topbar d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <button class="mobile-toggle" id="btnToggleAdmin"><i class="fa-solid fa-bars"></i></button>
                    <div class="page-title mb-0">
                        <h1 class="mb-0">{% block page_header %}Dashboard{% endblock %}</h1>
                    </div>
                </div>
                <div class="user-profile-top">
                    <div class="avatar-admin">A</div>
                    <span class="fw-semibold text-secondary">Super Admin</span>
                </div>
            </header>

            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btnToggle = document.getElementById('btnToggleAdmin');
            const sidebar = document.getElementById('sidebarMenuAdmin');
            const overlay = document.getElementById('mobileOverlayAdmin');

            if(btnToggle) {
                btnToggle.addEventListener('click', function() {
                    sidebar.classList.add('show-mobile');
                    overlay.classList.add('show-mobile');
                });
            }
            if(overlay) {
                overlay.addEventListener('click', function() {
                    sidebar.classList.remove('show-mobile');
                    overlay.classList.remove('show-mobile');
                });
            }
        });
    </script>
</body>
</html>
