<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}FindYourKost{% endblock %}</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Bootstrap (Tambahkan ini agar responsif grid berjalan) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">

    <!-- SUNTIKAN CSS MOBILE UNTUK BERANDA -->
    <style>
        /* Mencegah layar geser ke kanan kiri */
        body { overflow-x: hidden; } 
        
        @media (max-width: 768px) {
            /* Perkecil text Hero (Temukan Kos Impianmu) biar ga nabrak */
            h1.hero-title, .hero-section h1 {
                font-size: 2rem !important;
                line-height: 1.2 !important;
            }
            .hero-subtitle, .hero-section p {
                font-size: 0.9rem !important;
            }
            /* Rapikan Card Kos di HP */
            .card-img-top {
                height: 180px !important;
                object-fit: cover;
            }
        }
    </style>

    {% block css %}{% endblock %}
</head>
<body>

    {% if session.get('user_id') %}
        {% include 'components/navbar.html' %}
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Script Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
