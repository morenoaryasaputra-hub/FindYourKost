{% extends 'pemilik/base.html' %}
{% block content %}
<h2>Tambah Kos Baru</h2>
<form method="POST" enctype="multipart/form-data" class="mt-3">
    <div class="mb-3">
        <label>Nama Kos</label>
        <input type="text" name="nama_kost" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Alamat</label>
        <textarea name="alamat" class="form-control" required></textarea>
    </div>
    <div class="mb-3">
        <label>Harga (per bulan)</label>
        <input type="number" name="harga" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Total Kamar</label>
        <input type="number" name="total_kamar" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Tipe Penghuni</label>
        <select name="tipe_penghuni" class="form-control">
            <option value="putra">Putra</option>
            <option value="putri">Putri</option>
            <option value="campur">Campur</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Foto Thumbnail</label>
        <input type="file" name="foto_thumbnail" class="form-control" accept="image/*">
    </div>
    <button type="submit" class="btn btn-success">Simpan Data</button>
</form>
{% endblock %}
