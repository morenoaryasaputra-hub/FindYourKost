<nav class="navbar">

    <div class="nav-left">

        <a
            href="/"
            class="logo">

            FindYourKost

        </a>

    </div>

    <div class="nav-center">

        <a
            href="/"
            class="nav-link">

            Beranda

        </a>

        <a
            href="/cari-kos"
            class="nav-link">

            Cari Kos

        </a>

        <a
            href="/wishlist"
            class="nav-link">

            Wishlist

        </a>

        <a
            href="/booking-saya"
            class="nav-link">

            Booking Saya

        </a>

        <a
            href="chat"
            class="nav-link">

            Pesan

        </a>

    </div>

    <div class="nav-right">

        <button class="notif-btn">

            🔔

        </button>

        <div class="user-menu">

            <div
                class="avatar"
                id="avatarBtn">

                {% if session.get('foto_profil') %}

                    <img
                        src="{{ session['foto_profil'] }}"
                        alt="Avatar">

                {% else %}

                    {{ session['nama'][0]|upper }}

                {% endif %}

            </div>

            <div
                class="dropdown"
                id="dropdownMenu">

                <div class="dropdown-header">

                    {{ session['nama'] }}

                </div>

                <hr>

                <a href="/akun">

                    Profil Saya

                </a>

                <a href="#">

                    Pengaturan

                </a>

                <a href="/logout">

                    Logout

                </a>

            </div>

        </div>

    </div>

</nav>

<script>

document.addEventListener(
    "DOMContentLoaded",
    function(){

        const avatarBtn =
            document.getElementById(
                "avatarBtn"
            );

        const dropdownMenu =
            document.getElementById(
                "dropdownMenu"
            );

        avatarBtn.addEventListener(
            "click",
            function(e){

                e.stopPropagation();

                dropdownMenu.classList.toggle(
                    "show"
                );

            }
        );

        document.addEventListener(
            "click",
            function(e){

                if(
                    !dropdownMenu.contains(
                        e.target
                    )
                    &&
                    !avatarBtn.contains(
                        e.target
                    )
                ){

                    dropdownMenu.classList.remove(
                        "show"
                    );

                }

            }
        );

    }
);

</script>
