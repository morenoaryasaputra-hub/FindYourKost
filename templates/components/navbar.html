        </a>

    </div>

    <div class="nav-center">

        <a href="/" class="nav-link">
            Beranda

        <a href="#" class="nav-link">
            Cari Kos
        </a>

        <a href="#" class="nav-link">
            Wishlist
        </a>

        <a href="#" class="nav-link">
            Booking Saya
        </a>

        <a href="#" class="nav-link">
            Pesan
        </a>

    </div>

    <div class="nav-right">

        <button class="notif-btn">

            🔔

        </button>

        <div class="user-menu">

            <div
                class="avatar"
                id="avatarBtn">

                {{ session['nama'][0]|upper }}

            </div>

            <div
                class="dropdown"
                id="dropdownMenu">

                <div class="dropdown-header">

                    {{ session['nama'] }}

                </div>

                <hr>

                <a href="/akun">

                    Profil Saya

                </a>

                <a href="#">

                    Pengaturan

                </a>

                <a href="/logout">

                    Logout

                </a>

            </div>

        </div>

    </div>

</nav>

<script>

document.addEventListener(
    "DOMContentLoaded",
    function(){

        const avatarBtn =
        document.getElementById(
            "avatarBtn"
        );

        const dropdownMenu =
        document.getElementById(
            "dropdownMenu"
        );

        avatarBtn.addEventListener(
            "click",
            function(e){

                e.stopPropagation();

                dropdownMenu.classList.toggle(
                    "show"
                );
            }
        );

        document.addEventListener(
            "click",
            function(e){

                if(
                    !dropdownMenu.contains(
                        e.target
                    )
                    &&
                    !avatarBtn.contains(
                        e.target
                    )
                ){

                    dropdownMenu.classList.remove(
                        "show"
                    );
                }
            }
        );

    }
);

</script>
