<!-- ========================================== -->
<!-- SCRIPT UNTUK MENJALANKAN NOTIFIKASI        -->
<!-- ========================================== -->
<script>
    function toggleNotif() {
        const kotak = document.getElementById('kotak-notif');
        kotak.style.display = kotak.style.display === 'none' ? 'block' : 'none';
    }

    async function fetchNotifikasi() {
        try {
            const res = await fetch('/api/notifikasi');
            const data = await res.json();
            
            const badge = document.getElementById('badge-notif');
            if(data.unread > 0) {
                badge.innerText = data.unread;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }

            const wadah = document.getElementById('isi-notif');
            wadah.innerHTML = '';
            
            if(data.data.length === 0) {
                wadah.innerHTML = '<div style="padding: 20px; text-align: center; color: #9ca3af; font-size: 13px;">🔕 Belum ada notifikasi</div>';
                return;
            }

            data.data.forEach(n => {
                const bg = n.is_read ? 'white' : '#eff6ff'; 
                wadah.innerHTML += `
                    <div style="padding: 15px; border-bottom: 1px solid #f3f4f6; background: ${bg}; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='${bg}'">
                        <h5 style="margin: 0 0 5px 0; font-size: 14px; color: #111827;">${n.judul}</h5>
                        <p style="margin: 0; font-size: 12px; color: #6b7280; line-height: 1.4;">${n.pesan}</p>
                    </div>
                `;
            });
        } catch(e) { console.log("Gagal memuat notifikasi"); }
    }

    async function tandaiSemuaDibaca() {
        await fetch('/api/notifikasi/read', { method: 'POST' });
        fetchNotifikasi(); 
    }

    document.addEventListener("DOMContentLoaded", () => {
        fetchNotifikasi();
        setInterval(fetchNotifikasi, 30000); 
    });
</script>

<script>

document.addEventListener(
    "DOMContentLoaded",
    function(){

        const avatarBtn =
            document.getElementById(
                "avatarBtn"
            );

        const dropdownMenu =
            document.getElementById(
                "dropdownMenu"
            );

        avatarBtn.addEventListener(
            "click",
            function(e){

                e.stopPropagation();

                dropdownMenu.classList.toggle(
                    "show"
                );

            }
        );

        document.addEventListener(
            "click",
            function(e){

                if(
                    !dropdownMenu.contains(
                        e.target
                    )
                    &&
                    !avatarBtn.contains(
                        e.target
                    )
                ){

                    dropdownMenu.classList.remove(
                        "show"
                    );

                }

            }
        );

    }
);

</script>
